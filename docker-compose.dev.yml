version: '3.8'

services:
  # Databases
  pg-auth:
    image: postgres:16-alpine
    container_name: lerno-pg-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_auth
    ports:
      - "5432:5432"
    volumes:
      - pg-auth-data:/var/lib/postgresql/data

  pg-user:
    image: postgres:16-alpine
    container_name: lerno-pg-user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_user
    ports:
      - "5433:5432"
    volumes:
      - pg-user-data:/var/lib/postgresql/data

  pg-tutor:
    image: postgres:16-alpine
    container_name: lerno-pg-tutor
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_tutor
    ports:
      - "5434:5432"
    volumes:
      - pg-tutor-data:/var/lib/postgresql/data

  pg-booking:
    image: postgres:16-alpine
    container_name: lerno-pg-booking
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_booking
    ports:
      - "5435:5432"
    volumes:
      - pg-booking-data:/var/lib/postgresql/data

  pg-payment:
    image: postgres:16-alpine
    container_name: lerno-pg-payment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_payment
    ports:
      - "5436:5432"
    volumes:
      - pg-payment-data:/var/lib/postgresql/data

  pg-notif:
    image: postgres:16-alpine
    container_name: lerno-pg-notif
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_notif
    ports:
      - "5437:5432"
    volumes:
      - pg-notif-data:/var/lib/postgresql/data

  pg-review:
    image: postgres:16-alpine
    container_name: lerno-pg-review
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_review
    ports:
      - "5438:5432"
    volumes:
      - pg-review-data:/var/lib/postgresql/data

  pg-message:
    image: postgres:16-alpine
    container_name: lerno-pg-message
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lerno_message
    ports:
      - "5439:5432"
    volumes:
      - pg-message-data:/var/lib/postgresql/data

  # Cache
  redis:
    image: redis:7-alpine
    container_name: lerno-redis
    ports:
      - "6379:6379"

  # Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: lerno-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  pg-auth-data:
  pg-user-data:
  pg-tutor-data:
  pg-booking-data:
  pg-payment-data:
  pg-notif-data:
  pg-review-data:
  pg-message-data:
